name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: "1.26.0"
        check-latest: true

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Get dependencies
      run: |
        export GOTOOLCHAIN=local
        go mod download

    - name: Run tests
      run: |
        export GOTOOLCHAIN=local
        go test -v ./...

    - name: Run tests with race detector
      run: |
        export GOTOOLCHAIN=local
        go test -race -v ./...

    - name: Run vet
      run: |
        export GOTOOLCHAIN=local
        go vet ./...

    - name: Check formatting
      run: |
        export GOTOOLCHAIN=local
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files are not formatted:"
          gofmt -s -l .
          exit 1
        fi

  sseclient:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: sseclient/package-lock.json

    - name: Verify version sync
      run: |
        ROOT_VERSION=$(cat .version)
        SSE_VERSION=$(node -p "require('./sseclient/package.json').version")
        WS_VERSION=$(node -p "require('./client/package.json').version")
        HANDLER_VERSION=$(sed -n 's/^[[:space:]]*WebSocketClientVersion = "\([^"]*\)".*/\1/p' websocket_client_handlers.go | head -n 1)

        test "$ROOT_VERSION" = "$SSE_VERSION"
        test "$ROOT_VERSION" = "$WS_VERSION"
        test "$ROOT_VERSION" = "$HANDLER_VERSION"

    - name: Install SSE client dependencies
      working-directory: sseclient
      run: npm ci

    - name: Run SSE client tests
      working-directory: sseclient
      run: npm test

    - name: Build SSE client
      working-directory: sseclient
      run: npm run build

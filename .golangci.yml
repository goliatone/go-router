version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gitroot
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - durationcheck
    - errchkjson
    - errcheck
    - errorlint
    - funlen
    - gocyclo
    - govet
    - ineffassign
    - nestif
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - nosprintfhostport
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testifylint
    - unconvert
    - unused
    - usestdlibvars
  settings:
    dupl:
      threshold: 120
    errcheck:
      check-type-assertions: true
      check-blank: true
    funlen:
      lines: 90
      statements: 45
      ignore-comments: true
    gocyclo:
      min-complexity: 15
    nestif:
      min-complexity: 5
    govet:
      enable:
        - shadow
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          toml: snake
          mapstructure: snake
    testifylint:
      enable-all: true
  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - comments
      - common-false-positives
    rules:
      - path: ^examples/
        linters:
          - dupl
          - errcheck
          - funlen
          - gocyclo
          - govet
          - ineffassign
          - nestif
          - nolintlint
          - staticcheck
          - unconvert
          - unused
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - gocyclo
          - nestif
formatters:
  enable:
    - gofmt
  exclusions:
    generated: strict

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: false
